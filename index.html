<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Estudos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Gerenciador de Estudos</h1>
    <p>Desafio Digitec</p>
  </header>

  <main>

    <section class="card">
      <h2>Adicionar Matéria</h2>

      <div class="campo">
        <label for="nomeMateria">Nome da matéria</label>
        <input type="text" id="nomeMateria" placeholder="Ex: Matemática" />
      </div>

      <button onclick="adicionarMateria()">Adicionar Matéria</button>

      <ul id="listaMaterias"></ul>
    </section>

    <section class="card">
      <h2>Adicionar Atividade</h2>

      <div class="campo">
        <label for="selectMateria">Matéria</label>
        <select id="selectMateria">
          <option value="">Selecione a matéria</option>
        </select>
      </div>

      <div class="campo">
        <label for="nomeAtividade">Nome da atividade</label>
        <input type="text" id="nomeAtividade" placeholder="Ex: Prova do 2º bimestre" />
      </div>

      <div class="linha">
        <div class="campo">
          <label for="categoria">Categoria</label>
          <select id="categoria">
            <option value="Prova">Prova</option>
            <option value="Estudo">Estudo</option>
            <option value="Trabalho">Trabalho</option>
            <option value="Exercício">Exercício</option>
            <option value="Projeto">Projeto</option>
          </select>
        </div>

        <div class="campo">
          <label for="prioridade">Prioridade</label>
          <select id="prioridade">
            <option value="Alta">Alta</option>
            <option value="Média">Média</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>

        <div class="campo">
          <label for="nota">Nota (0–10)</label>
          <input type="number" id="nota" placeholder="Ex: 8.5" min="0" max="10" step="0.1" />
        </div>

        <div class="campo">
          <label for="data">Data</label>
          <input type="date" id="data" />
        </div>
      </div>

      <button onclick="adicionarAtividade()">Adicionar Atividade</button>
    </section>

    <section class="card card-wiki" id="cardWiki" style="display: none;">
      <h2>📖 Sobre: <span id="wikiTitulo"></span></h2>
      <p id="wikiTexto"></p>
    </section>

    <section class="card">
      <h2>Atividades por Matéria</h2>
      <div id="listaAtividades">
        <p id="mensagemVazia">Nenhuma atividade cadastrada ainda.</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
